name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mod_version=$VERSION" >> "$GITHUB_ENV"

      - name: Build
        run: ./gradlew build --stacktrace -Pmod_version=${{ steps.ver.outputs.version }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: WAgJS87R
          name: ${{ github.event.release.name }}
          version: ${{ steps.ver.outputs.version }}
          changelog: ${{ github.event.release.body }}
          loaders: neoforge
          game-versions: "1.21.1"
          environment: client_or_server_prefers_both
          dependencies: |-
            [{
              "project_id": "T9PomCSv",
              "dependency_type": "required"
            }]
          files: build/libs/sable-surefooting-${{ steps.ver.outputs.version }}.jar
